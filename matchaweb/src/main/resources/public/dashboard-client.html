<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Klien - Matcha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #f5f5f5; padding-bottom: 60px; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background-color: #1a1a1a; border-bottom: 1px solid #2e4a31; }
        nav .logo { font-size: 24px; font-weight: bold; color: #ffffff; text-decoration: none; cursor: pointer; }
        nav .logo span { color: #8fbc8f; }
        
        .btn-outline { background-color: transparent; color: #8fbc8f; border: 1px solid #8fbc8f; padding: 6px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; margin-right: 10px; }
        .btn-outline:hover { background-color: #8fbc8f; color: #121212; }
        .btn-logout { background-color: #ff4747; color: white; border: none; padding: 6px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background-color: #ff6b6b; }

        /* Layout Dashboard */
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        
        /* Panel Profil */
        .profile-panel { background-color: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 16px; padding: 25px; height: fit-content; }
        .profile-panel h3 { color: #8fbc8f; margin-bottom: 10px; border-bottom: 1px solid #2e4a31; padding-bottom: 10px; }
        .profile-panel p { color: #a0a0a0; font-size: 14px; margin-bottom: 8px; }
        .profile-panel strong { color: #f5f5f5; }

        /* Panel Histori Booking */
        .history-panel { background-color: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 16px; padding: 25px; }
        .history-panel h3 { color: #8fbc8f; margin-bottom: 20px; border-bottom: 1px solid #2e4a31; padding-bottom: 10px; }
        
        .booking-card { background-color: #121212; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .booking-card h4 { margin-bottom: 5px; color: #fff; }
        .booking-card p { font-size: 13px; color: #a0a0a0; margin-bottom: 5px; }
        
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .status-pending { background-color: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid #ffc107; }
        .status-confirmed { background-color: rgba(143, 188, 143, 0.2); color: #8fbc8f; border: 1px solid #8fbc8f; }
        .status-cancelled { background-color: rgba(255, 71, 71, 0.2); color: #ff4747; border: 1px solid #ff4747; }
        
        .empty-state { text-align: center; color: #a0a0a0; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="window.location.href='/'">🍵 Matcha<span>Companion</span></div>
        <div>
            <span id="nav-greeting" style="color: #a0a0a0; margin-right: 15px; font-size: 14px;"></span>
            <button class="btn-outline" onclick="window.location.href='/'">Kembali ke Beranda</button>
            <button class="btn-logout" onclick="logout()">Keluar</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-panel">
            <h3>Profil Saya</h3>
            <p>Nama: <strong id="profile-nama">-</strong></p>
            <p>Email: <strong id="profile-email">-</strong></p>
            <p>No. Telp: <strong id="profile-telp">-</strong></p>
            <p style="margin-top: 15px;"><span class="status-badge status-confirmed">MEMBER AKTIF</span></p>
        </div>

        <div class="history-panel">
            <h3>Riwayat Booking</h3>
            <div id="booking-container">
                <p class="empty-state">Sedang memuat data pesanan...</p>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            // 1. Cek apakah ada user yang login
            const userSession = localStorage.getItem('matcha_user');
            
            if (!userSession) {
                // Jika belum login, tendang balik ke halaman login
                alert("Anda harus masuk terlebih dahulu!");
                window.location.href = '/login.html';
                return;
            }

            currentUser = JSON.parse(userSession);

            // Jika yang nyasar ke sini adalah Talent, arahkan ke dashboard talent
            if (currentUser.role.toLowerCase() === 'talent') {
                window.location.href = '/dashboard-talent.html';
                return;
            }

            // 2. Tampilkan data diri di panel profil
            document.getElementById('nav-greeting').innerHTML = `Halo, <b style="color:#8fbc8f;">${currentUser.nama.split(' ')[0]}</b>!`;
            document.getElementById('profile-nama').innerText = currentUser.nama;
            document.getElementById('profile-email').innerText = currentUser.email;
            document.getElementById('profile-telp').innerText = currentUser.noTelp || '-';

            // 3. Tarik data riwayat booking dari Backend
            fetchBookingHistory();
        });

        function fetchBookingHistory() {
            const container = document.getElementById('booking-container');
            
            // Tembak endpoint GET /api/bookings yang sudah kita buat di Modul 3
            fetch(`/api/bookings?userId=${currentUser.id}&role=client`)
                .then(res => res.json())
                .then(result => {
                    container.innerHTML = ''; // Bersihkan loading

                    if (result.status === 'success') {
                        const bookings = result.data;

                        if (bookings.length === 0) {
                            container.innerHTML = `<p class="empty-state">Kamu belum pernah menyewa companion. Yuk jelajahi katalog talent kami!</p>`;
                            return;
                        }

                        // Render setiap pesanan jadi HTML
                        bookings.forEach(b => {
                            let statusClass = 'status-pending';
                            let statusText = 'Menunggu Konfirmasi';
                            
                            if (b.status === 'CONFIRMED') { statusClass = 'status-confirmed'; statusText = 'Diterima'; }
                            else if (b.status === 'CANCELLED') { statusClass = 'status-cancelled'; statusText = 'Ditolak'; }
                            else if (b.status === 'COMPLETED') { statusClass = 'status-confirmed'; statusText = 'Selesai'; }

                            // Format tanggal agar rapi
                            const tglMulai = new Date(b.waktuMulai).toLocaleString('id-ID');
                            const tglSelesai = new Date(b.waktuSelesai).toLocaleString('id-ID');

                            container.innerHTML += `
                                <div class="booking-card">
                                    <h4>ID Pesanan: ${b.id}</h4>
                                    <p>ID Layanan: ${b.serviceId}</p>
                                    <p>Jadwal: ${tglMulai} - ${tglSelesai}</p>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>
                            `;
                        });
                    }
                })
                .catch(err => {
                    container.innerHTML = `<p class="empty-state" style="color: #ff4747;">Gagal menarik data dari server.</p>`;
                });
        }

        function logout() {
            localStorage.removeItem('matcha_user');
            window.location.href = '/'; 
        }
    </script>
</body>
</html>
