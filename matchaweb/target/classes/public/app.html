<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcha Companion</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.3s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(143, 188, 143, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header" style="padding: 15px;">
                <div class="sidebar-logo" style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap; cursor: pointer;" onclick="window.location.href='/'">
                    <span style="font-size: 22px; line-height: 1;"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="vertical-align: text-bottom;"><path d="M2 21h18v-2H2M20 8h-2V5c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2v-5c0-1.11-.89-2-2-2zm-4 7c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V5h10v10zm4-4h-2V7h2v4z"/></svg></span>
                    <span style="color: var(--text-primary); font-weight: 700; font-size: 20px;">Matcha</span>
                    <span style="color: var(--primary); font-weight: 400; font-size: 20px;">Companion</span>
                </div>
            </div>
            <div class="sidebar-nav" id="sidebar-nav-container">
                <!-- Injected by app.js -->
            </div>
            <div class="sidebar-footer">
                <button class="btn btn-outline btn-block" onclick="toggleTheme()" style="margin-bottom: 10px;"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="vertical-align: text-bottom;"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg> Ganti Tema</button>
                <button class="btn btn-danger btn-block" onclick="logout()">Keluar</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="padding: 0; position: relative;">
            <header class="top-header" style="position: absolute; top: 0; left: 0; right: 0; z-index: 10; border-bottom: 1px solid var(--border); background: var(--bg-card);">
                <h3 id="page-title" style="margin: 0; color: var(--text-primary);">Dashboard</h3>
                <div class="user-greeting" id="nav-greeting" style="color: var(--text-secondary); font-size: 14px;"></div>
            </header>
            
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
            </div>

            <iframe id="main-frame" name="main-frame" src="" frameborder="0" style="width: 100%; height: 100vh; padding-top: 70px; box-sizing: border-box;"></iframe>
        </main>
    </div>

    <script src="/js/utils/helpers.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
